<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="roseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f43f5e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e11d48;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fff1f2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffe4e6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background soft rose circle -->
  <rect width="100" height="100" rx="24" fill="url(#bgGrad)"/>
  
  <!-- Outer glowing ring -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#roseGrad)" stroke-width="2" stroke-dasharray="4 2" opacity="0.4"/>
  
  <!-- Petals/Leaves layer -->
  <path d="M50 25 C58 35, 68 35, 75 50 C68 65, 58 65, 50 75 C42 65, 32 65, 25 50 C32 35, 42 35, 50 25 Z" fill="url(#roseGrad)" opacity="0.15"/>
  <path d="M25 50 C35 58, 35 68, 50 75 C65 68, 65 58, 75 50 C65 42, 65 32, 50 25 C35 32, 35 42, 25 50 Z" fill="url(#roseGrad)" opacity="0.15"/>

  <!-- Elegant Location Pin Flower Base -->
  <path d="M50 16 C34 16, 22 28, 22 44 C22 66, 50 84, 50 84 C50 84, 78 66, 78 44 C78 28, 66 16, 50 16 Z" fill="url(#roseGrad)"/>
  
  <!-- Blooming Flower center details inside the pin -->
  <circle cx="50" cy="42" r="12" fill="#ffffff" />
  
  <!-- Inner core -->
  <circle cx="50" cy="42" r="7" fill="url(#roseGrad)" />
  
  <!-- Mini petals -->
  <circle cx="50" cy="27" r="4.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="50" cy="57" r="4.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="35" cy="42" r="4.5" fill="#ffffff" opacity="0.9"/>
  <circle cx="65" cy="42" r="4.5" fill="#ffffff" opacity="0.9"/>
</svg>
